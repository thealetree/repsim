<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Repsim — Natural Selection Simulator</title>
    <style>
      /* Reset — remove all default margins/padding so the canvas fills the screen */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden; /* No scrollbars — the canvas IS the page */
        background: #0a0a12; /* Match canvas background color */
      }

      #app {
        width: 100%;
        height: 100%;
      }

      /* Make the PixiJS canvas fill its container */
      #app canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      // Apply saved theme before first paint to avoid a dark flash for light-mode users.
      try {
        if (localStorage.getItem('repsim-theme') === 'light') {
          document.documentElement.classList.add('light-theme');
          document.documentElement.style.background = '#f8f9fb';
          document.body.style.background = '#f8f9fb';
        }
      } catch (e) { /* localStorage may be disabled */ }
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
